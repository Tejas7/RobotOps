version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: robotops-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: robotops
      POSTGRES_USER: robotops
      POSTGRES_PASSWORD: robotops
    volumes:
      - robotops_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: robotops-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "60", "1"]
    volumes:
      - robotops_redis:/data

volumes:
  robotops_postgres:
  robotops_redis:
