version: "3.9"

services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: robotops-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: robotops
      POSTGRES_USER: robotops
      POSTGRES_PASSWORD: robotops
    volumes:
      - robotops_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: robotops-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "60", "1"]
    volumes:
      - robotops_redis:/data

  nats:
    image: nats:2.11-alpine
    container_name: robotops-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js", "-m", "8222"]
    volumes:
      - robotops_nats:/data

volumes:
  robotops_postgres:
  robotops_redis:
  robotops_nats:
